<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum Parodia 2026 ⚽</title>
  <style>
    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(to bottom, #4a148c, #311b92); 
      margin: 0; padding: 0; 
      height: 100vh; 
      overflow: hidden; 
      color: #fff; 
      text-align: center; 
    }
    #portada {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://files.catbox.moe/0i7q0j.jpg') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: opacity 0.8s;
    }
    #portada.hidden { opacity: 0; pointer-events: none; }
    #portada h1 {
      font-size: 3.5em;
      margin: 0;
      text-shadow: 0 4px 10px #000;
    }
    #portada .by {
      font-size: 1.4em;
      margin: 10px 0 40px;
      opacity: 0.9;
    }
    .menu-btn {
      background: linear-gradient(#ff5722, #e64a19);
      color: white;
      border: none;
      padding: 18px 60px;
      margin: 15px;
      font-size: 1.6em;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      transition: all 0.3s;
      width: 80%;
      max-width: 400px;
    }
    .menu-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 30px rgba(0,0,0,0.7);
    }
    .menu-btn.blocked {
      background: #333;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      animation: none;
    }
    .menu-btn.available {
      background: linear-gradient(#ff9800, #f57c00);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    #contenido, #sobres-section {
      display: none;
      height: 100vh;
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
    }
    .volver-btn {
      background: #7b1fa2;
      color: white;
      border: none;
      padding: 12px 30px;
      margin: 15px;
      font-size: 1.2em;
      border-radius: 50px;
      cursor: pointer;
    }
    /* Estilos de cartas y paginación (resumidos) */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
    .card { background: rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.6); height: 260px; position: relative; }
    .card.tiene { border: 3px solid #4caf50; }
    .card img { width: 100%; height: 160px; object-fit: cover; }
    .no-tiene-img { width: 100%; height: 160px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 5em; color: #222; }
    .nombre { font-size: 1.15em; font-weight: bold; }
    .club { font-size: 0.9em; color: #ffeb3b; }
    .status { position: absolute; top: 8px; right: 8px; font-size: 2.2em; color: #ffeb3b; }
    .pagination { margin: 20px 0; display: flex; justify-content: center; }
    .pagination button { background: #7b1fa2; color: white; padding: 12px 25px; margin: 0 15px; border-radius: 50px; border: none; cursor: pointer; font-size: 1.2em; }
    .pagination button:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>
  <!-- Portada inicial -->
  <div id="portada">
    <h1>Álbum Parodia 2026</h1>
    <div class="by">By rodryneta</div>
    <button class="menu-btn" onclick="mostrarSeccion('album')">Álbum</button>
    <button id="sobres-btn" class="menu-btn blocked" onclick="mostrarSeccion('sobres')">Sobres</button>
  </div>

  <!-- Sección Álbum -->
  <div id="contenido">
    <button class="volver-btn" onclick="volverPortada()">Volver a Portada</button>
    <div id="progreso">Completado: 0 / 147</div>
    <div class="pagination">
      <button id="prev-btn">Anterior</button>
      <span id="page-info" class="page-info">Página 1 / 23</span>
      <button id="next-btn">Siguiente</button>
    </div>
    <div class="grid" id="album"></div>
    <footer>Hecho por rodryneta con Grok • José C. Paz 2026</footer>
  </div>

  <!-- Sección Sobres -->
  <div id="sobres-section">
    <button class="volver-btn" onclick="volverPortada()">Volver a Portada</button>
    <h2>Sobres</h2>
    <button id="abrir-sobre-btn" class="menu-btn blocked">Abrir Sobre (5 figuritas)</button>
    <div id="sobre-mensaje"></div>
  </div>

  <script>
    // Datos (pegá tu array completo de data aquí, el de clubes y jugadores)
    const data = [ /* ... tu lista de 23 clubes y jugadores ... */ ];

    const figuritas = [];
    let idCounter = 1;
    data.forEach(item => {
      item.jugadores.forEach(nombre => {
        figuritas.push({ id: idCounter++, nombre, club: item.club, tiene: false });
      });
    });

    const total = figuritas.length;
    const clubs = data.map(d => d.club);
    let currentPage = 0;

    const fotosJugador = { /* mapa de imágenes reales como antes */ };
    const fotoNegra = 'https://via.placeholder.com/150/000000/000000?text=?';

    const albumDiv = document.getElementById('album');
    const progreso = document.getElementById('progreso');
    const pageInfo = document.getElementById('page-info');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const abrirSobreBtn = document.getElementById('abrir-sobre-btn');
    const sobreMensaje = document.getElementById('sobre-mensaje');

    function mostrarSeccion(seccion) {
      document.getElementById('portada').classList.add('hidden');
      document.getElementById('contenido').style.display = seccion === 'album' ? 'block' : 'none';
      document.getElementById('sobres-section').style.display = seccion === 'sobres' ? 'block' : 'none';
      if (seccion === 'album') actualizarTodo();
    }

    function volverPortada() {
      document.getElementById('portada').classList.remove('hidden');
      document.getElementById('contenido').style.display = 'none';
      document.getElementById('sobres-section').style.display = 'none';
    }

    function cargar() {
      const guardado = localStorage.getItem('albumParodiaPegadas');
      if (guardado) {
        const ids = JSON.parse(guardado);
        figuritas.forEach(f => { if (ids.includes(f.id)) f.tiene = true; });
      }
      actualizarTodo();
      actualizarSobres();
    }

    function guardar() {
      const pegadasIds = figuritas.filter(f => f.tiene).map(f => f.id);
      localStorage.setItem('albumParodiaPegadas', JSON.stringify(pegadasIds));
    }

    function actualizarTodo() {
      const completado = figuritas.filter(f => f.tiene).length;
      progreso.textContent = `Completado: ${completado} / ${total}`;

      const currentClub = clubs[currentPage];
      const clubJugadores = figuritas.filter(f => f.club === currentClub);

      pageInfo.textContent = `Página ${currentPage + 1} / ${clubs.length} - ${currentClub}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === clubs.length - 1;

      albumDiv.innerHTML = '';
      clubJugadores.forEach((f) => {
        const card = document.createElement('div');
        card.className = `card ${f.tiene ? 'tiene' : ''}`;
        const imgContent = f.tiene 
          ? `<img src="\( {fotosJugador[f.nombre] || fotoNegra}" alt=" \){f.nombre}">`
          : `<div class="no-tiene-img"><span>?</span></div>`;
        card.innerHTML = `
          ${imgContent}
          <p class="nombre">${f.nombre}</p>
          <p class="club">${f.club}</p>
          <div class="status">${f.tiene ? '✓' : '?'}</div>
        `;
        albumDiv.appendChild(card);
      });
    }

    // Lógica de sobres (12h acumulables)
    let ultimo = localStorage.getItem('albumParodiaUltimoSobre') || Date.now();
    const cooldownMs = 12 * 60 * 60 * 1000;

    function actualizarSobres() {
      const disponibles = Math.floor((Date.now() - parseInt(ultimo)) / cooldownMs);
      const btn = document.getElementById('abrir-sobre-btn');
      if (disponibles > 0) {
        btn.classList.remove('blocked');
        btn.classList.add('available');
        btn.disabled = false;
        sobreMensaje.textContent = `¡${disponibles} sobre(s) disponible(s)!`;
      } else {
        btn.classList.add('blocked');
        btn.classList.remove('available');
        btn.disabled = true;
        const proximo = new Date(parseInt(ultimo) + cooldownMs);
        const restaMs = proximo - Date.now();
        const horas = Math.floor(restaMs / 3600000);
        const mins = Math.floor((restaMs % 3600000) / 60000);
        sobreMensaje.textContent = `Próximo en ${horas}h ${mins}min`;
      }
    }

    document.getElementById('abrir-sobre-btn').addEventListener('click', () => {
      // Pegá acá la lógica completa de abrir sobre del código anterior
      // (el for loop con nuevas, guardar, alert, etc.)
      alert('¡Abriste sobre(s)! (agregá la lógica completa aquí)');
      ultimo = Date.now().toString();
      localStorage.setItem('albumParodiaUltimoSobre', ultimo);
      actualizarSobres();
    });

    // Paginación
    prevBtn.addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        actualizarTodo();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentPage < clubs.length - 1) {
        currentPage++;
        actualizarTodo();
      }
    });

    cargar();
    setInterval(actualizarSobres, 60000);
  </script>
</body>
  </html>
